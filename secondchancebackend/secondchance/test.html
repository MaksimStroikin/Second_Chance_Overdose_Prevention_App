<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Second Chance Backend</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        textarea {
            width: 100%;
            height: 80px;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            resize: none;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #responseArea {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            min-height: 50px;
        }
        audio {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>🎙️ Test Gemini + ElevenLabs</h1>
    <p>As long as your Spring Boot backend is running on port 8080, this will work. Type a question below and hit Send.</p>

    <textarea id="questionInput" placeholder="e.g. What are the signs of an overdose?"></textarea>
    <button onclick="askAI()">Send to Backend</button>

    <div id="responseArea">Waiting for question...</div>
    <audio id="audioPlayer" controls style="display: none;"></audio>

    <script>
        async function askAI() {
            const question = document.getElementById('questionInput').value;
            const responseArea = document.getElementById('responseArea');
            const audioPlayer = document.getElementById('audioPlayer');

            if (!question.trim()) return;

            responseArea.innerHTML = "<i>Asking Gemini and generating audio... (This may take 4-8 seconds)</i>";
            audioPlayer.style.display = "none";
            audioPlayer.src = "";

            try {
                // Must be localhost if testing from the same machine
                const response = await fetch('http://localhost:8080/api/qna/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: question })
                });

                const data = await response.json();

                // Show Text
                responseArea.innerHTML = `<strong>Gemini Says:</strong><br/> ${data.responseMessage}`;

                // Set Audio and Play
                if (data.voiceover) {
                    audioPlayer.src = `http://localhost:8080${data.voiceover}`;
                    audioPlayer.style.display = "block";
                    audioPlayer.play();
                }

            } catch (error) {
                console.error("Error:", error);
                // Note: If you get a CORS error, you might need to enable CORS in your Spring Boot application!
                responseArea.innerHTML = "<span style='color:red;'>Error connecting to backend (make sure it's running via ./gradlew bootRun). If it's a CORS error, we need to add @CrossOrigin to the Controller!</span>";
            }
        }
    </script>
</body>
</html>
